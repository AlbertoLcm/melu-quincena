<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="needs-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    <linearGradient id="wants-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>
    <linearGradient id="savings-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>
  </defs>
  
  <!-- Necesidades (50%) - Trazo Izquierdo -->
  <path d="M 24 75 L 24 25" stroke="url(#needs-grad)" stroke-width="10" stroke-linecap="round" />
  
  <!-- Deseos (30%) - Arco Central -->
  <path d="M 24 25 C 32 10, 42 10, 50 25 L 50 75" stroke="url(#wants-grad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Ahorros (20%) - Arco Derecho -->
  <path d="M 50 45 C 58 32, 68 32, 76 45 L 76 75" stroke="url(#savings-grad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
</svg>
